<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>My Recipe Box</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  :root {
    --sage: #7c9473;
    --sage-light: #e8efe6;
    --sage-dark: #5a7252;
    --cream: #faf8f5;
    --warm-gray: #6b6560;
    --warm-gray-light: #a8a29e;
    --text: #3d3833;
    --card-bg: #ffffff;
    --border: #e7e5e0;
    --accent: #c4956a;
    --accent-light: #f5ece3;
    --danger: #c0695a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  .app-container { max-width: 480px; margin: 0 auto; padding-bottom: 80px; }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--sage) 0%, var(--sage-dark) 100%);
    color: white;
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .header-sub { font-size: 12px; opacity: 0.8; margin-top: 2px; font-weight: 400; }

  /* Search */
  .search-bar {
    margin: 12px 20px 0;
    position: relative;
  }
  .search-bar input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    background: rgba(255,255,255,0.2);
    color: white;
    outline: none;
  }
  .search-bar input::placeholder { color: rgba(255,255,255,0.6); }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.6;
    font-size: 16px;
  }

  /* Tabs */
  .tab-bar {
    display: flex;
    gap: 0;
    background: white;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 90;
  }
  .tab {
    flex: 1;
    padding: 12px 8px;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--warm-gray-light);
    border: none;
    background: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab.active { color: var(--sage); border-bottom-color: var(--sage); }
  .tab-icon { font-size: 20px; display: block; margin-bottom: 2px; }

  /* Filter chips */
  .filter-row {
    display: flex;
    gap: 8px;
    padding: 12px 20px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    border: 1.5px solid var(--border);
    background: white;
    color: var(--warm-gray);
    cursor: pointer;
    transition: all 0.2s;
  }
  .chip.active { background: var(--sage); color: white; border-color: var(--sage); }

  /* Recipe cards */
  .recipe-list { padding: 0 16px; }
  .recipe-card {
    background: var(--card-bg);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    border: 1px solid var(--border);
  }
  .recipe-card:active { transform: scale(0.98); }
  .recipe-card-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .recipe-card h3 { font-size: 16px; font-weight: 600; color: var(--text); line-height: 1.3; flex: 1; }
  .recipe-card .calories { font-size: 13px; color: var(--accent); font-weight: 600; white-space: nowrap; margin-left: 12px; }
  .recipe-meta { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
  .meta-tag { font-size: 12px; color: var(--warm-gray-light); display: flex; align-items: center; gap: 3px; }
  .recipe-tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .recipe-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--sage-light);
    color: var(--sage-dark);
    font-weight: 500;
  }
  .source-tag {
    background: var(--accent-light);
    color: var(--accent);
  }

  /* Recipe detail */
  .detail-overlay {
    position: fixed;
    inset: 0;
    background: var(--cream);
    z-index: 200;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .detail-header {
    background: linear-gradient(135deg, var(--sage) 0%, var(--sage-dark) 100%);
    color: white;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .back-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    font-size: 20px;
    width: 36px;
    height: 36px;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .detail-header h2 { font-size: 18px; font-weight: 600; line-height: 1.3; }
  .detail-body { padding: 20px; }
  .detail-meta-row {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .detail-meta-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 14px;
    background: white;
    border-radius: 12px;
    border: 1px solid var(--border);
    min-width: 70px;
  }
  .detail-meta-item .value { font-size: 16px; font-weight: 700; color: var(--sage); }
  .detail-meta-item .label { font-size: 11px; color: var(--warm-gray-light); margin-top: 2px; }
  .detail-section { margin-bottom: 20px; }
  .detail-section h3 {
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--sage);
    margin-bottom: 10px;
  }
  .ingredient-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 15px;
  }
  .ingredient-check {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .ingredient-check.checked { background: var(--sage); border-color: var(--sage); color: white; }
  .instruction-item { padding: 10px 0; font-size: 15px; line-height: 1.5; border-bottom: 1px solid var(--border); display: flex; gap: 10px; }
  .step-num { font-weight: 700; color: var(--sage); min-width: 24px; }
  .cook-note { font-style: italic; color: var(--warm-gray); font-size: 14px; padding: 12px; background: var(--accent-light); border-radius: 10px; margin-top: 12px; line-height: 1.5; }
  .add-to-list-btn {
    width: 100%;
    padding: 14px;
    background: var(--sage);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
  }
  .add-to-list-btn:active { background: var(--sage-dark); }
  .added-btn { background: var(--warm-gray-light); }

  /* Shopping list */
  .shopping-section { padding: 16px 20px; }
  .shopping-section h3 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: var(--text); }
  .shopping-recipe-group { margin-bottom: 16px; }
  .shopping-recipe-name { font-size: 13px; font-weight: 600; color: var(--sage); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.3px; }
  .shopping-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 15px;
  }
  .shopping-item.crossed { text-decoration: line-through; color: var(--warm-gray-light); }
  .clear-list-btn {
    width: 100%;
    padding: 12px;
    background: white;
    color: var(--danger);
    border: 1.5px solid var(--danger);
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 12px;
  }
  .remove-recipe-btn {
    font-size: 18px;
    color: var(--danger);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0 4px;
    opacity: 0.6;
  }

  /* Pantry search */
  .pantry-section { padding: 16px 20px; }
  .pantry-input-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .pantry-input {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    background: white;
    outline: none;
  }
  .pantry-input:focus { border-color: var(--sage); }
  .pantry-add-btn {
    padding: 10px 16px;
    background: var(--sage);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .pantry-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .pantry-tag {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 12px;
    background: var(--sage-light);
    border-radius: 20px;
    font-size: 13px;
    color: var(--sage-dark);
    font-weight: 500;
  }
  .pantry-tag button { background: none; border: none; color: var(--sage-dark); font-size: 16px; cursor: pointer; padding: 0 2px; }
  .match-score { font-size: 12px; color: var(--sage); font-weight: 600; }

  /* Add recipe form */
  .form-section { padding: 16px 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--warm-gray); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.3px; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    background: white;
    outline: none;
    font-family: inherit;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--sage); }
  .form-group textarea { min-height: 100px; resize: vertical; }
  .form-row { display: flex; gap: 12px; }
  .form-row .form-group { flex: 1; }
  .save-recipe-btn {
    width: 100%;
    padding: 14px;
    background: var(--sage);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }

  /* Nutrition row */
  .nutrition-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 8px;
  }
  .nutrition-item {
    text-align: center;
    padding: 8px;
    background: var(--sage-light);
    border-radius: 8px;
  }
  .nutrition-item .n-val { font-size: 15px; font-weight: 700; color: var(--sage-dark); }
  .nutrition-item .n-label { font-size: 10px; color: var(--warm-gray); margin-top: 2px; }

  /* Empty state */
  .empty-state { text-align: center; padding: 40px 20px; color: var(--warm-gray-light); }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; line-height: 1.5; }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: white;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    z-index: 300;
    animation: slideUp 0.3s ease;
    white-space: nowrap;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateX(-50%) translateY(20px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  .recipe-count { font-size: 13px; color: var(--warm-gray-light); padding: 8px 20px 4px; }
  .serving-adjust { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .serving-btn { width: 32px; height: 32px; border-radius: 8px; border: 1.5px solid var(--border); background: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .serving-btn:active { background: var(--sage-light); }
  .serving-num { font-size: 16px; font-weight: 600; min-width: 60px; text-align: center; }
</style>
</head>

    nutrition: {carbs: "21g", protein: "3g", fat: "3g", fiber: "2g", sodium: "226mg"},
    ingredients: ["200g whole wheat flour (or any heirloom whole grain flour)","120g high extraction flour (or use 60g more whole wheat/60g more high gluten flour)","80g high gluten/bread flour","100g starter","292g warm water","10g salt"],
    instructions: ["Combine warm water & starter; starter should float if it's ready to make bread.","Add flours & bring dough together, 4-5 minutes of gentle turning with a bowl scraper. Add salt and mix until just incorporated. Rest 30 minutes, then fold dough by pulling one corner out gently and folding it back into the middle, turning the dough and repeating until you have done the full circle of dough (4-5 folds). Wait 15-30 mins and repeat the folding process 2-3 more times. Rest 1 hour then shape dough. Place shaped bread in a napkin and cover. Put in fridge overnight.","The next day, pull out bread to come to room temp. Meanwhile, heat Dutch oven to 500°F. Place dough in Dutch oven and cover 20 minutes. Remove cover and bake another 15-20 minutes."],
    notes: "A classic \"no-knead\" sourdough bread that can work around your schedule. Start it the day before and let the dough rise overnight in the fridge."

    instructions: ["Mix together the ingredients and place in a clean container. If you're planning on using the starter the same day, or are reactivating the starter after a long dormant period, you can leave out on the counter. Otherwise, store it in the fridge.","Feel free to divide the starter and feed a part of it another kind of flour, such as rye or einkorn, so you have different starters for different breads!"],

    nutrition: {carbs: "5g", protein: "1g", fat: "1g", fiber: "1g", sodium: "45mg"},
    ingredients: ["1/2 cup (70g) all-purpose einkorn flour (or all-purpose flour)","1/2 cup (70g) high-extraction flour (or whole wheat flour)","200g sourdough starter","4 tablespoons (55g) melted butter (or 3 T olive oil for vegan)","1 teaspoon (5g) salt"],
    instructions: ["Preheat oven to 400°F.","In medium mixing bowl, combine all ingredients and then knead together to a smooth dough.","Divide dough into 4 balls. Let dough rest 10-15 minutes, covered. Roll out each ball separately into a wide circle between 2 sheets of parchment paper to get very thin. Remove top sheet of paper, prick the dough all over with a fork and use a chef's knife to cut like a pie into 16 triangles (no need to separate the triangles; they won't expand as they bake). Slide parchment onto a baking sheet and bake crackers 10-12 minutes until nicely browned."],

    ingredients: ["185 gm unsalted butter, browned & cooled slightly","200 gm sugar","200 gm brown sugar","3 egg yolks","5 gm vanilla extract","240 gm sourdough starter","380 gm all-purpose flour","4 gm baking powder","3 gm baking soda","2 gm sea salt","500 gm chocolate chips"],
    instructions: ["Heat oven 375°F (when ready to bake; dough can rest in fridge or freezer for better texture/spread).","First make the browned butter. You have to start with more butter to end up with 185 grams. Melt butter and boil over medium/high heat until it melts, bubbles, and then foams. Keep an eye on it after this point so that it doesn't burn. Remove from the heat when it is golden and smells toasty. Let cool, then weigh 185g.","Mix flour, baking soda, baking powder together in medium bowl with a whisk.","In a large bowl, whisk melted butter, sugars and vanilla. Whisk in the eggs. Whisk in the starter. Stir in dry mixture and whisk briskly for 45 seconds. Add the chips. At this point you can let the dough rest/chill in the fridge for 1-2 hours or overnight (can also form into logs and freeze). Scoop teaspoon-size rounds.","Line baking sheets with parchment paper. Space rounds 1 inch apart on baking sheets. Bake 8-12 mins until just firm to the touch."],
    notes: ""

  {
    id: 30, name: "Neapolitan Sourdough Pizza Crust", source: "Canyon Ranch",
    time: "3 hrs (30 min active)", difficulty: "Moderate", servings: "2 pizza crusts", calories: 130,
    category: "Bread/Baking",
    nutrition: {carbs: "5g", protein: "2g", fat: "1g", fiber: "1g", sodium: "90mg"},
    ingredients: ["375 gm warm water","100 gm active sourdough starter","10 gm salt","500 gm flour - blend or just all-purpose or bread flour"],
    instructions: ["Mix the dough: Place the starter, salt, and water in a large bowl. Stir with a spatula to combine. Add the flour. Mix again until the flour is completely incorporated. Transfer to a vessel with tea towel or cloth bowl cover and let stand 30 minutes.","Stretch and fold: after 30 minutes have passed, reach into the vessel and pull the dough up and into the center. Turn the vessel quarter turns and continue this pulling 8 to 10 times. Let the dough rest for another 30 minutes; then repeat. If possible, repeat this cycle twice more for a total of 4 stretch and folds.","Bulk fermentation: Cover vessel and set aside to rise at room temperature for 4 to 18 hours until the dough has roughly doubled in volume.","Portion and shape: Turn the dough out onto a work surface and shape into a rough ball. Divide the dough into 4 equal portions. Roll each portion into a ball. Transfer each round of dough to a plastic quart container, cover, and store in fridge for at least 6 hours or up to 3 days.","Make the pizzas: Pull out a round of dough from the fridge before you plan on baking. Set oven to 550°F. Heat oven for at least 45 minutes. Shape dough into a 10-inch round and bake on parchment until blistered, about 5-6 minutes."],
    notes: "Top and Bake options: Classic Margherita-style with tomato sauce, mozzarella, parmesan, and olive oil. Or kale and crème fraîche pizza with minced garlic and Parmigiano Reggiano."

    instructions: ["Preheat oven to 375°F when ready to bake.","Pour water into large mixing bowl, stir in yeast, honey & molasses. Let sit until yeast is foamy, about 5 minutes.","Add cooked cereal & dry ingredients and stir until mixture forms a mass and is no longer sticky. Knead dough on a flat surface until smooth and elastic, about 5 minutes. Add the sprouted whole grains and continue to knead until combined.","Place dough ball in a bowl and cover with damp cloth. Let rise in a warm place for about 1-2 hours until doubled inside.","Punch down the dough and divide in half. Roll dough into smooth oblong shapes that fit into lightly greased bread pans.","Allow bread to rise again until dough rises 2 inches above the rim of bread pan, about 30 minutes. Bake for 40-45 minutes until a probe thermometer reads 180-200°F. Let loaves cool on a wire rack for 20 additional minutes before slicing."],

  {
    id: 35, name: "Chocolate Dream Chiffon", source: "Canyon Ranch",
    time: "15 min", difficulty: "Easy", servings: "12", calories: 95,
    category: "Dessert",
    nutrition: {carbs: "20g", protein: "4g", fat: "1g", fiber: "1g", sodium: "43mg"},
    ingredients: ["1 package organic tofu, or 4 ripe avocados","3/4 cup honey","3 teaspoons vanilla extract","1/2 cup cocoa powder"],
    instructions: ["In a food processor, soften tofu until creamy. Combine honey, cocoa and vanilla and add to tofu. Blend for 1 minute. Pour into dessert cups and chill."],
    notes: "Use this dreamy dessert with some chocolate cake as a base, or a dip for fresh fruits. Swapping 4 avocados for the tofu yields a thicker dessert full of healthy fat & fiber. Calories do increase. Expect about 157 calories per serving."
  }
];

const CATEGORIES = ["All", "Poultry", "Beef", "Seafood", "Soup", "Salad", "Vegetable", "Side Dish", "Sauce/Dressing", "Breakfast", "Bread/Baking", "Dessert", "Beverage"];

function App() {
  const [recipes, setRecipes] = useState(() => {
    try {
      const saved = window._recipeData;
      return saved || INITIAL_RECIPES;
    } catch { return INITIAL_RECIPES; }
  });
  const [activeTab, setActiveTab] = useState("browse");
  const [search, setSearch] = useState("");
  const [category, setCategory] = useState("All");
  const [selectedRecipe, setSelectedRecipe] = useState(null);
  const [shoppingList, setShoppingList] = useState([]);
  const [checkedItems, setCheckedItems] = useState({});
  const [pantryItems, setPantryItems] = useState([]);
  const [pantryInput, setPantryInput] = useState("");
  const [toast, setToast] = useState(null);
  const [checkedIngredients, setCheckedIngredients] = useState({});
  const [servingMultiplier, setServingMultiplier] = useState(1);

  // Save recipes to a global so we don't lose them
  useEffect(() => { window._recipeData = recipes; }, [recipes]);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2000);
  };

  // Filtered recipes
  const filtered = useMemo(() => {
    let list = recipes;
    if (category !== "All") list = list.filter(r => r.category === category);
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(r =>
        r.name.toLowerCase().includes(q) ||
        r.ingredients.some(i => i.toLowerCase().includes(q)) ||
        r.category.toLowerCase().includes(q)
      );
    }
    return list;
  }, [recipes, category, search]);

  // Pantry matches
  const pantryMatches = useMemo(() => {
    if (pantryItems.length === 0) return [];
    return recipes.map(r => {
      const matched = pantryItems.filter(p =>
        r.ingredients.some(i => i.toLowerCase().includes(p.toLowerCase()))
      );
      return { ...r, matchCount: matched.length, matchedItems: matched };
    }).filter(r => r.matchCount > 0).sort((a, b) => b.matchCount - a.matchCount);
  }, [recipes, pantryItems]);

  const addToShoppingList = (recipe) => {
    if (shoppingList.find(r => r.id === recipe.id)) {
      showToast("Already on your list!");
      return;
    }
    setShoppingList(prev => [...prev, recipe]);
    showToast("Added to shopping list!");
  };

  const removeFromShoppingList = (id) => {
    setShoppingList(prev => prev.filter(r => r.id !== id));
    const newChecked = {...checkedItems};
    Object.keys(newChecked).forEach(k => { if (k.startsWith(id + "-")) delete newChecked[k]; });
    setCheckedItems(newChecked);
  };

  const toggleShoppingItem = (key) => {
    setCheckedItems(prev => ({...prev, [key]: !prev[key]}));
  };

  const addPantryItem = () => {
    const item = pantryInput.trim();
    if (item && !pantryItems.includes(item)) {
      setPantryItems(prev => [...prev, item]);
      setPantryInput("");
    }
  };

  const addRecipe = (newRecipe) => {
    setRecipes(prev => [...prev, {...newRecipe, id: Date.now(), source: "My Recipe"}]);
    showToast("Recipe saved!");
    setActiveTab("browse");
  };

  return (
    React.createElement("div", {className: "app-container"},
      // Header
      React.createElement("div", {className: "header"},
        React.createElement("h1", null, "My Recipe Box"),
        React.createElement("div", {className: "header-sub"}, recipes.length + " recipes"),
        activeTab === "browse" && React.createElement("div", {className: "search-bar"},
          React.createElement("span", {className: "search-icon"}, "\u{1F50D}"),
          React.createElement("input", {
            type: "text",
            placeholder: "Search recipes or ingredients...",
            value: search,
            onChange: e => setSearch(e.target.value)
          })
        )
      ),

      // Tabs
      React.createElement("div", {className: "tab-bar"},
        [{id: "browse", icon: "\u{1F4D6}", label: "Recipes"},
         {id: "pantry", icon: "\u{1F9CA}", label: "What's On Hand"},
         {id: "shopping", icon: "\u{1F6D2}", label: "Shopping"},
         {id: "add", icon: "\u2795", label: "Add New"}
        ].map(tab =>
          React.createElement("button", {
            key: tab.id,
            className: "tab" + (activeTab === tab.id ? " active" : ""),
            onClick: () => setActiveTab(tab.id)
          },
            React.createElement("span", {className: "tab-icon"}, tab.icon),
            tab.label
          )
        )
      ),

      // Browse tab
      activeTab === "browse" && React.createElement(React.Fragment, null,
        React.createElement("div", {className: "filter-row"},
          CATEGORIES.map(cat =>
            React.createElement("button", {
              key: cat,
              className: "chip" + (category === cat ? " active" : ""),
              onClick: () => setCategory(cat)
            }, cat)
          )
        ),
        React.createElement("div", {className: "recipe-count"}, filtered.length + " recipe" + (filtered.length !== 1 ? "s" : "")),
        React.createElement("div", {className: "recipe-list"},
          filtered.map(r =>
            React.createElement("div", {
              key: r.id,
              className: "recipe-card",
              onClick: () => { setSelectedRecipe(r); setServingMultiplier(1); setCheckedIngredients({}); }
            },
              React.createElement("div", {className: "recipe-card-header"},
                React.createElement("h3", null, r.name),
                r.calories > 0 && React.createElement("span", {className: "calories"}, r.calories + " cal")
              ),
              React.createElement("div", {className: "recipe-meta"},
                React.createElement("span", {className: "meta-tag"}, "\u23F1 " + r.time),
                React.createElement("span", {className: "meta-tag"}, "\u{1F4AA} " + r.difficulty),
                React.createElement("span", {className: "meta-tag"}, "\u{1F37D} " + r.servings)
              ),
              React.createElement("div", {className: "recipe-tags"},
                React.createElement("span", {className: "recipe-tag"}, r.category),
                React.createElement("span", {className: "recipe-tag source-tag"}, r.source)
              )
            )
          ),
          filtered.length === 0 && React.createElement("div", {className: "empty-state"},
            React.createElement("div", {className: "empty-icon"}, "\u{1F50D}"),
            React.createElement("p", null, "No recipes found. Try a different search or category.")
          )
        )
      ),

      // Pantry / What's on Hand tab
      activeTab === "pantry" && React.createElement("div", {className: "pantry-section"},
        React.createElement("h3", {style: {fontSize: "18px", marginBottom: "8px"}}, "What ingredients do you have?"),
        React.createElement("p", {style: {fontSize: "14px", color: "var(--warm-gray)", marginBottom: "16px"}}, "Add ingredients you have on hand and I'll find recipes you can make."),
        React.createElement("div", {className: "pantry-input-row"},
          React.createElement("input", {
            className: "pantry-input",
            placeholder: "e.g. chicken, garlic, miso...",
            value: pantryInput,
            onChange: e => setPantryInput(e.target.value),
            onKeyDown: e => e.key === "Enter" && addPantryItem()
          }),
          React.createElement("button", {className: "pantry-add-btn", onClick: addPantryItem}, "Add")
        ),
        pantryItems.length > 0 && React.createElement("div", {className: "pantry-tags"},
          pantryItems.map((item, i) =>
            React.createElement("span", {key: i, className: "pantry-tag"},
              item,
              React.createElement("button", {onClick: () => setPantryItems(prev => prev.filter((_, j) => j !== i))}, "\u00D7")
            )
          )
        ),
        pantryMatches.length > 0 && React.createElement(React.Fragment, null,
          React.createElement("h3", {style: {fontSize: "16px", margin: "16px 0 8px"}}, "Matching Recipes"),
          React.createElement("div", {className: "recipe-list", style: {padding: 0}},
            pantryMatches.map(r =>
              React.createElement("div", {
                key: r.id,
                className: "recipe-card",
                onClick: () => { setSelectedRecipe(r); setServingMultiplier(1); setCheckedIngredients({}); }
              },
                React.createElement("div", {className: "recipe-card-header"},
                  React.createElement("h3", null, r.name),
                  React.createElement("span", {className: "match-score"}, r.matchCount + "/" + pantryItems.length + " match")
                ),
                React.createElement("div", {className: "recipe-meta"},
                  React.createElement("span", {className: "meta-tag"}, "\u23F1 " + r.time),
                  React.createElement("span", {className: "meta-tag"}, r.calories + " cal")
                ),
                React.createElement("div", {className: "recipe-tags"},
                  r.matchedItems.map((m, i) =>
                    React.createElement("span", {key: i, className: "recipe-tag"}, "\u2705 " + m)
                  )
                )
              )
            )
          )
        ),
        pantryItems.length > 0 && pantryMatches.length === 0 && React.createElement("div", {className: "empty-state"},
          React.createElement("div", {className: "empty-icon"}, "\u{1F937}"),
          React.createElement("p", null, "No matching recipes found. Try adding more ingredients or different ones.")
        )
      ),

      // Shopping list tab
      activeTab === "shopping" && React.createElement("div", {className: "shopping-section"},
        React.createElement("h3", {style: {fontSize: "18px", marginBottom: "4px"}}, "Shopping List"),
        shoppingList.length === 0 ?
          React.createElement("div", {className: "empty-state"},
            React.createElement("div", {className: "empty-icon"}, "\u{1F6D2}"),
            React.createElement("p", null, "Your shopping list is empty. Browse recipes and tap \"Add to Shopping List\" to get started.")
          )
        :
          React.createElement(React.Fragment, null,
            React.createElement("p", {style: {fontSize: "13px", color: "var(--warm-gray)", marginBottom: "16px"}}, shoppingList.length + " recipe" + (shoppingList.length !== 1 ? "s" : "") + " selected"),
            shoppingList.map(recipe =>
              React.createElement("div", {key: recipe.id, className: "shopping-recipe-group"},
                React.createElement("div", {style: {display: "flex", justifyContent: "space-between", alignItems: "center"}},
                  React.createElement("span", {className: "shopping-recipe-name"}, recipe.name),
                  React.createElement("button", {className: "remove-recipe-btn", onClick: () => removeFromShoppingList(recipe.id)}, "\u2715")
                ),
                recipe.ingredients.map((ing, i) => {
                  const key = recipe.id + "-" + i;
                  return React.createElement("div", {
                    key: key,
                    className: "shopping-item" + (checkedItems[key] ? " crossed" : ""),
                    onClick: () => toggleShoppingItem(key)
                  },
                    React.createElement("div", {className: "ingredient-check" + (checkedItems[key] ? " checked" : "")},
                      checkedItems[key] && "\u2713"
                    ),
                    ing
                  );
                })
              )
            ),
            React.createElement("button", {
              className: "clear-list-btn",
              onClick: () => { setShoppingList([]); setCheckedItems({}); }
            }, "Clear Entire List")
          )
      ),

      // Add recipe tab
      activeTab === "add" && React.createElement(AddRecipeForm, {onSave: addRecipe}),

      // Recipe detail overlay
      selectedRecipe && React.createElement(RecipeDetail, {
        recipe: selectedRecipe,
        onClose: () => setSelectedRecipe(null),
        onAddToList: addToShoppingList,
        isInList: shoppingList.some(r => r.id === selectedRecipe.id),
        checkedIngredients, setCheckedIngredients,
        servingMultiplier, setServingMultiplier
      }),

      // Toast
      toast && React.createElement("div", {className: "toast"}, toast)
    )
  );
}

function RecipeDetail({recipe, onClose, onAddToList, isInList, checkedIngredients, setCheckedIngredients, servingMultiplier, setServingMultiplier}) {
  const toggleIngredient = (i) => {
    setCheckedIngredients(prev => ({...prev, [i]: !prev[i]}));
  };

  return React.createElement("div", {className: "detail-overlay"},
    React.createElement("div", {className: "detail-header"},
      React.createElement("button", {className: "back-btn", onClick: onClose}, "\u2190"),
      React.createElement("h2", null, recipe.name)
    ),
    React.createElement("div", {className: "detail-body"},
      // Meta row
      React.createElement("div", {className: "detail-meta-row"},
        React.createElement("div", {className: "detail-meta-item"},
          React.createElement("span", {className: "value"}, recipe.time),
          React.createElement("span", {className: "label"}, "Time")
        ),
        React.createElement("div", {className: "detail-meta-item"},
          React.createElement("span", {className: "value"}, recipe.difficulty),
          React.createElement("span", {className: "label"}, "Difficulty")
        ),
        recipe.calories > 0 && React.createElement("div", {className: "detail-meta-item"},
          React.createElement("span", {className: "value"}, recipe.calories),
          React.createElement("span", {className: "label"}, "Calories")
        )
      ),

      // Nutrition
      recipe.nutrition && recipe.calories > 0 && React.createElement("div", {className: "detail-section"},
        React.createElement("h3", null, "Nutrition Per Serving"),
        React.createElement("div", {className: "nutrition-grid"},
          React.createElement("div", {className: "nutrition-item"},
            React.createElement("div", {className: "n-val"}, recipe.nutrition.protein),
            React.createElement("div", {className: "n-label"}, "Protein")
          ),
          React.createElement("div", {className: "nutrition-item"},
            React.createElement("div", {className: "n-val"}, recipe.nutrition.carbs),
            React.createElement("div", {className: "n-label"}, "Carbs")
          ),
          React.createElement("div", {className: "nutrition-item"},
            React.createElement("div", {className: "n-val"}, recipe.nutrition.fat),
            React.createElement("div", {className: "n-label"}, "Fat")
          ),
          React.createElement("div", {className: "nutrition-item"},
            React.createElement("div", {className: "n-val"}, recipe.nutrition.fiber),
            React.createElement("div", {className: "n-label"}, "Fiber")
          ),
          React.createElement("div", {className: "nutrition-item"},
            React.createElement("div", {className: "n-val"}, recipe.nutrition.sodium),
            React.createElement("div", {className: "n-label"}, "Sodium")
          )
        )
      ),

      // Servings
      React.createElement("div", {className: "detail-section"},
        React.createElement("h3", null, "Serves: " + recipe.servings)
      ),

      // Ingredients
      React.createElement("div", {className: "detail-section"},
        React.createElement("h3", null, "Ingredients"),
        recipe.ingredients.map((ing, i) =>
          React.createElement("div", {
            key: i,
            className: "ingredient-item",
            onClick: () => toggleIngredient(i)
          },
            React.createElement("div", {className: "ingredient-check" + (checkedIngredients[i] ? " checked" : "")},
              checkedIngredients[i] && "\u2713"
            ),
            React.createElement("span", {style: checkedIngredients[i] ? {textDecoration: "line-through", color: "var(--warm-gray-light)"} : {}}, ing)
          )
        )
      ),

      // Instructions
      React.createElement("div", {className: "detail-section"},
        React.createElement("h3", null, "Instructions"),
        recipe.instructions.map((step, i) =>
          React.createElement("div", {key: i, className: "instruction-item"},
            React.createElement("span", {className: "step-num"}, (i + 1) + "."),
            React.createElement("span", null, step)
          )
        )
      ),

      // Cook's notes
      recipe.notes && React.createElement("div", {className: "cook-note"}, "\u{1F468}\u200D\u{1F373} Cook's Note: " + recipe.notes),

      // Add to shopping list
      React.createElement("button", {
        className: "add-to-list-btn" + (isInList ? " added-btn" : ""),
        onClick: () => onAddToList(recipe),
        style: {marginTop: "16px"}
      }, isInList ? "\u2705 On Shopping List" : "\u{1F6D2} Add to Shopping List"),

      // Source
      React.createElement("div", {style: {textAlign: "center", marginTop: "16px", fontSize: "12px", color: "var(--warm-gray-light)"}}, "Source: " + recipe.source)
    )
  );
}

function AddRecipeForm({onSave}) {
  const [name, setName] = useState("");
  const [time, setTime] = useState("");
  const [difficulty, setDifficulty] = useState("Easy");
  const [servings, setServings] = useState("");
  const [calories, setCalories] = useState("");
  const [cat, setCat] = useState("Poultry");
  const [ingredients, setIngredients] = useState("");
  const [instructions, setInstructions] = useState("");
  const [notes, setNotes] = useState("");

  const handleSave = () => {
    if (!name.trim() || !ingredients.trim()) return;
    onSave({
      name: name.trim(),
      time: time || "N/A",
      difficulty,
      servings: servings || "N/A",
      calories: parseInt(calories) || 0,
      category: cat,
      nutrition: {carbs: "-", protein: "-", fat: "-", fiber: "-", sodium: "-"},
      ingredients: ingredients.split("\n").map(s => s.trim()).filter(Boolean),
      instructions: instructions.split("\n").map(s => s.trim()).filter(Boolean),
      notes: notes.trim()
    });
    setName(""); setTime(""); setServings(""); setCalories("");
    setIngredients(""); setInstructions(""); setNotes("");
  };

  return React.createElement("div", {className: "form-section"},
    React.createElement("h3", {style: {fontSize: "18px", marginBottom: "16px"}}, "Add a New Recipe"),
    React.createElement("div", {className: "form-group"},
      React.createElement("label", null, "Recipe Name *"),
      React.createElement("input", {value: name, onChange: e => setName(e.target.value), placeholder: "e.g. Grandma's Chicken Soup"})
    ),
    React.createElement("div", {className: "form-row"},
      React.createElement("div", {className: "form-group"},
        React.createElement("label", null, "Time"),
        React.createElement("input", {value: time, onChange: e => setTime(e.target.value), placeholder: "30 min"})
      ),
      React.createElement("div", {className: "form-group"},
        React.createElement("label", null, "Servings"),
        React.createElement("input", {value: servings, onChange: e => setServings(e.target.value), placeholder: "4"})
      )
    ),
    React.createElement("div", {className: "form-row"},
      React.createElement("div", {className: "form-group"},
        React.createElement("label", null, "Difficulty"),
        React.createElement("select", {value: difficulty, onChange: e => setDifficulty(e.target.value)},
          ["Easy", "Moderate", "Advanced"].map(d => React.createElement("option", {key: d, value: d}, d))
        )
      ),
      React.createElement("div", {className: "form-group"},
        React.createElement("label", null, "Calories"),
        React.createElement("input", {type: "number", value: calories, onChange: e => setCalories(e.target.value), placeholder: "200"})
      )
    ),
    React.createElement("div", {className: "form-group"},
      React.createElement("label", null, "Category"),
      React.createElement("select", {value: cat, onChange: e => setCat(e.target.value)},
        CATEGORIES.filter(c => c !== "All").map(c => React.createElement("option", {key: c, value: c}, c))
      )
    ),
    React.createElement("div", {className: "form-group"},
      React.createElement("label", null, "Ingredients * (one per line)"),
      React.createElement("textarea", {value: ingredients, onChange: e => setIngredients(e.target.value), placeholder: "1 cup flour\n2 eggs\n1/2 cup sugar"})
    ),
    React.createElement("div", {className: "form-group"},
      React.createElement("label", null, "Instructions (one step per line)"),
      React.createElement("textarea", {value: instructions, onChange: e => setInstructions(e.target.value), placeholder: "Preheat oven to 350\u00B0F.\nMix dry ingredients together.\nAdd wet ingredients and stir."})
    ),
    React.createElement("div", {className: "form-group"},
      React.createElement("label", null, "Cook's Notes"),
      React.createElement("textarea", {value: notes, onChange: e => setNotes(e.target.value), placeholder: "Any tips, substitutions, or variations...", style: {minHeight: "60px"}})
    ),
    React.createElement("button", {className: "save-recipe-btn", onClick: handleSave}, "Save Recipe")
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
