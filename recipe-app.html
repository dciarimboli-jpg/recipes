<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Recipe Box">
<title>Recipe Box</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  :root {
    --primary: #85346C;
    --primary-dark: #6b2a57;
    --primary-light: #f0e4ed;
    --bg: #E9D9E8;
    --surface: #f8f4f8;
    --text-primary: #352B4C;
    --text-secondary: #4e4368;
    --text-tertiary: #7d7394;
    --border: #d4c6d3;
    --border-light: #ddd2dc;
    --accent: #c17f3e;
    --accent-light: #fdf5ec;
    --danger: #b85450;
    --danger-light: #fdf0f0;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
    --shadow-lg: 0 12px 32px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
    --radius: 12px;
    --radius-sm: 8px;
    --radius-lg: 16px;
    --serif: 'DM Serif Display', Georgia, serif;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .app-container { max-width: 480px; margin: 0 auto; padding-bottom: 88px; background: var(--bg); border-radius: 20px; overflow: hidden; box-shadow: var(--shadow-lg); margin-top: 12px; margin-bottom: 12px; }

  /* ─── Header ─── */
  .header {
    background: var(--primary);
    padding: 20px 24px 0;
    border-bottom: none;
  }
  .header-top { display: flex; align-items: baseline; justify-content: space-between; }
  .header h1 {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 400;
    color: #E9D9E8;
    letter-spacing: -0.3px;
  }
  .header-sub {
    font-size: 13px;
    color: #E9D9E8;
    font-weight: 700;
  }

  /* ─── Search ─── */
  .search-bar { padding: 16px 0 0; }
  .search-bar input {
    width: 100%;
    padding: 12px 16px 12px 42px;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-family: var(--sans);
    background: #f8f4f8;
    color: #352B4C;
    outline: none;
    transition: background 0.2s;
  }
  .search-bar input:focus {
    background: #faf7fa;
  }
  .search-bar input::placeholder { color: rgba(53,43,76,0.5); }
  .search-wrap { position: relative; }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(53,43,76,0.5);
    font-size: 16px;
    pointer-events: none;
  }

  /* ─── Tabs ─── */
  .tab-bar {
    display: flex;
    gap: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .tab {
    flex: 1;
    padding: 14px 4px 12px;
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2px;
    color: var(--text-tertiary);
    border: none;
    background: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
  .tab-icon { font-size: 18px; display: block; margin-bottom: 3px; }

  /* ─── Filter chips ─── */
  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 16px 24px 8px;
  }
  .chip {
    padding: 7px 16px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--sans);
  }
  .chip:hover { border-color: var(--primary); color: var(--primary); }
  .chip.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }

  /* ─── Recipe cards ─── */
  .recipe-list { padding: 8px 20px; }
  .recipe-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 20px;
    margin-bottom: 12px;
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    border: 1px solid var(--border-light);
    position: relative;
    overflow: hidden;
  }
  .recipe-card:active { transform: scale(0.985); box-shadow: var(--shadow-md); }
  .recipe-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .recipe-card h3 {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 400;
    color: var(--text-primary);
    line-height: 1.25;
    flex: 1;
  }
  .recipe-card .calories {
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
    white-space: nowrap;
    background: var(--accent-light);
    padding: 3px 10px;
    border-radius: 100px;
  }
  .recipe-meta { display: flex; gap: 16px; margin-top: 10px; }
  .meta-tag {
    font-size: 12px;
    color: var(--text-tertiary);
    display: flex;
    align-items: center;
    gap: 4px;
    font-weight: 500;
  }
  .recipe-tags { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .recipe-tag {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 100px;
    background: var(--primary-light);
    color: var(--primary);
    font-weight: 600;
    letter-spacing: 0.1px;
  }
  .source-tag {
    background: var(--bg);
    color: var(--text-tertiary);
    border: 1px solid var(--border);
  }

  /* ─── Recipe detail ─── */
  .detail-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn {
    from { transform: translateX(30px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  .detail-header {
    background: var(--surface);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 10;
    border-bottom: 1px solid var(--border);
  }
  .back-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    font-size: 18px;
    width: 40px;
    height: 40px;
    border-radius: var(--radius);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .back-btn:active { background: var(--bg); }
  .detail-header h2 {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 400;
    line-height: 1.25;
    color: var(--text-primary);
  }
  .detail-body { padding: 24px; }

  /* Detail hero section */
  .detail-hero {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    border-radius: var(--radius-lg);
    padding: 24px;
    margin-bottom: 24px;
    color: white;
  }
  .detail-hero-title {
    font-family: var(--serif);
    font-size: 24px;
    line-height: 1.2;
    margin-bottom: 16px;
  }
  .detail-meta-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .detail-meta-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 16px;
    background: rgba(255,255,255,0.12);
    border-radius: var(--radius);
    min-width: 72px;
    backdrop-filter: blur(10px);
  }
  .detail-meta-item .value { font-size: 15px; font-weight: 700; }
  .detail-meta-item .label { font-size: 11px; opacity: 0.75; margin-top: 3px; font-weight: 500; }

  .detail-section { margin-bottom: 28px; }
  .detail-section h3 {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-tertiary);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .ingredient-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border-light);
    font-size: 15px;
    line-height: 1.4;
  }
  .ingredient-item:last-child { border-bottom: none; }
  .ingredient-check {
    width: 24px;
    height: 24px;
    border-radius: var(--radius-sm);
    border: 2px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    font-size: 13px;
  }
  .ingredient-check.checked { background: var(--primary); border-color: var(--primary); color: white; }

  .instruction-item {
    padding: 14px 0;
    font-size: 15px;
    line-height: 1.6;
    border-bottom: 1px solid var(--border-light);
    display: flex;
    gap: 14px;
  }
  .instruction-item:last-child { border-bottom: none; }
  .step-num {
    font-weight: 700;
    color: var(--primary);
    min-width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--primary-light);
    border-radius: 50%;
    font-size: 13px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .cook-note {
    color: var(--text-secondary);
    font-size: 14px;
    padding: 16px;
    background: var(--accent-light);
    border-radius: var(--radius);
    line-height: 1.6;
    border-left: 3px solid var(--accent);
    margin-top: 4px;
  }

  .add-to-list-btn {
    width: 100%;
    padding: 16px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    font-family: var(--sans);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.2px;
  }
  .add-to-list-btn:active { transform: scale(0.98); background: var(--primary-dark); }
  .added-btn { background: var(--text-tertiary); }

  /* ─── Nutrition ─── */
  .nutrition-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .nutrition-item {
    text-align: center;
    padding: 12px 8px;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border-light);
  }
  .nutrition-item .n-val { font-size: 16px; font-weight: 700; color: var(--primary); }
  .nutrition-item .n-label { font-size: 10px; color: var(--text-tertiary); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }

  /* ─── Shopping list ─── */
  .shopping-section { padding: 20px 24px; }
  .section-title {
    font-family: var(--serif);
    font-size: 22px;
    color: var(--text-primary);
    margin-bottom: 4px;
  }
  .section-desc { font-size: 14px; color: var(--text-tertiary); margin-bottom: 20px; line-height: 1.5; }
  .shopping-recipe-group {
    margin-bottom: 20px;
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 16px 20px;
    border: 1px solid var(--border-light);
    box-shadow: var(--shadow-sm);
  }
  .shopping-recipe-name {
    font-family: var(--serif);
    font-size: 15px;
    color: var(--text-primary);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .shopping-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border-light);
    font-size: 15px;
    transition: opacity 0.2s;
  }
  .shopping-item:last-child { border-bottom: none; }
  .shopping-item.crossed { opacity: 0.4; }
  .shopping-item.crossed span { text-decoration: line-through; }
  .clear-list-btn {
    width: 100%;
    padding: 14px;
    background: var(--danger-light);
    color: var(--danger);
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 600;
    font-family: var(--sans);
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.15s;
  }
  .clear-list-btn:active { transform: scale(0.98); }
  .remove-recipe-btn {
    font-size: 16px;
    color: var(--text-tertiary);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: var(--radius-sm);
    transition: all 0.15s;
  }
  .remove-recipe-btn:hover { color: var(--danger); background: var(--danger-light); }

  /* ─── Pantry ─── */
  .pantry-section { padding: 20px 24px; }
  .pantry-input-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .pantry-input {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 15px;
    font-family: var(--sans);
    background: var(--surface);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .pantry-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(44,95,74,0.1); }
  .pantry-add-btn {
    padding: 12px 20px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 600;
    font-family: var(--sans);
    cursor: pointer;
    transition: all 0.15s;
  }
  .pantry-add-btn:active { background: var(--primary-dark); }
  .pantry-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .pantry-tag {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: var(--primary-light);
    border-radius: 100px;
    font-size: 13px;
    color: var(--primary);
    font-weight: 600;
  }
  .pantry-tag button {
    background: none;
    border: none;
    color: var(--primary);
    font-size: 15px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
    opacity: 0.6;
  }
  .pantry-tag button:hover { opacity: 1; }
  .match-badge {
    font-size: 11px;
    color: white;
    background: var(--primary);
    padding: 2px 8px;
    border-radius: 100px;
    font-weight: 700;
    letter-spacing: 0.2px;
  }

  /* ─── Add recipe form ─── */
  .form-section { padding: 20px 24px; }
  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 15px;
    font-family: var(--sans);
    background: var(--surface);
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(44,95,74,0.1);
  }
  .form-group textarea { min-height: 110px; resize: vertical; line-height: 1.5; }
  .form-row { display: flex; gap: 12px; }
  .form-row .form-group { flex: 1; }
  .save-recipe-btn {
    width: 100%;
    padding: 16px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    font-family: var(--sans);
    cursor: pointer;
    transition: all 0.15s;
  }
  .save-recipe-btn:active { transform: scale(0.98); background: var(--primary-dark); }

  /* ─── Empty states ─── */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-tertiary);
  }
  .empty-state .empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.5; }
  .empty-state p { font-size: 15px; line-height: 1.6; max-width: 280px; margin: 0 auto; }

  /* ─── Toast ─── */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text-primary);
    color: white;
    padding: 12px 24px;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    z-index: 300;
    animation: toastIn 0.3s ease;
    white-space: nowrap;
    box-shadow: var(--shadow-lg);
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(16px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  .recipe-count {
    font-size: 13px;
    color: var(--text-tertiary);
    padding: 4px 24px 8px;
    font-weight: 500;
  }

  /* ─── Dividers & misc ─── */
  .section-divider {
    height: 1px;
    background: var(--border);
    margin: 0 24px;
  }
  .source-line {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: var(--text-tertiary);
    font-style: italic;
  }
</style>
</head>

<div id="root"></div>

const CATEGORIES = ["All", "Poultry", "Beef", "Seafood", "Soup", "Salad", "Vegetable", "Side Dish", "Sauce/Dressing", "Breakfast", "Bread/Baking", "Dessert", "Beverage"];

function App() {
  const [recipes, setRecipes] = useState(() => {
    try { return window._recipeData || INITIAL_RECIPES; } catch { return INITIAL_RECIPES; }
  });
  const [activeTab, setActiveTab] = useState("browse");
  const [search, setSearch] = useState("");
  const [category, setCategory] = useState("All");
  const [selectedRecipe, setSelectedRecipe] = useState(null);
  const [shoppingList, setShoppingList] = useState([]);
  const [checkedItems, setCheckedItems] = useState({});
  const [pantryItems, setPantryItems] = useState([]);
  const [pantryInput, setPantryInput] = useState("");
  const [toast, setToast] = useState(null);
  const [checkedIngredients, setCheckedIngredients] = useState({});

  useEffect(() => { window._recipeData = recipes; }, [recipes]);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2000); };

  const filtered = useMemo(() => {
    let list = recipes;
    if (category !== "All") list = list.filter(r => r.category === category);
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(r =>
        r.name.toLowerCase().includes(q) ||
        r.ingredients.some(i => i.toLowerCase().includes(q)) ||
        r.category.toLowerCase().includes(q)
      );
    }
    return list;
  }, [recipes, category, search]);

  const pantryMatches = useMemo(() => {
    if (pantryItems.length === 0) return [];
    return recipes.map(r => {
      const matched = pantryItems.filter(p =>
        r.ingredients.some(i => i.toLowerCase().includes(p.toLowerCase()))
      );
      return { ...r, matchCount: matched.length, matchedItems: matched };
    }).filter(r => r.matchCount > 0).sort((a, b) => b.matchCount - a.matchCount);
  }, [recipes, pantryItems]);

  const addToShoppingList = (recipe) => {
    if (shoppingList.find(r => r.id === recipe.id)) { showToast("Already on your list"); return; }
    setShoppingList(prev => [...prev, recipe]);
    showToast("Added to shopping list");
  };

  const removeFromShoppingList = (id) => {
    setShoppingList(prev => prev.filter(r => r.id !== id));
    const nc = {...checkedItems};
    Object.keys(nc).forEach(k => { if (k.startsWith(id + "-")) delete nc[k]; });
    setCheckedItems(nc);
  };

  const addPantryItem = () => {
    const item = pantryInput.trim();
    if (item && !pantryItems.includes(item)) { setPantryItems(prev => [...prev, item]); setPantryInput(""); }
  };

  const addRecipe = (nr) => {
    setRecipes(prev => [...prev, {...nr, id: Date.now(), source: "My Recipe"}]);
    showToast("Recipe saved!");
    setActiveTab("browse");
  };

  const e = React.createElement;

  return e("div", {className: "app-container"},

    // Header
    activeTab === "browse" && e("div", {className: "header"},
      e("div", {className: "header-top"},
        e("h1", null, "Recipe Box"),
        e("span", {className: "header-sub"}, recipes.length + " recipes")
      ),
      e("div", {className: "search-bar"},
        e("div", {className: "search-wrap"},
          e("span", {className: "search-icon"}, "\u{1F50D}"),
          e("input", {
            type: "text",
            placeholder: "Search recipes or ingredients\u2026",
            value: search,
            onChange: ev => setSearch(ev.target.value)
          })
        )
      ),
      e("div", {style: {height: "16px"}})
    ),

    // Tab bar
    e("div", {className: "tab-bar"},
      [{id:"browse", icon:"\u{1F4D6}", label:"Recipes"},
       {id:"pantry", icon:"\u{1F96C}", label:"On Hand"},
       {id:"shopping", icon:"\u{1F6D2}", label:"Shop"},
       {id:"add", icon:"\u2795", label:"Add New"}
      ].map(t => e("button", {
        key: t.id,
        className: "tab" + (activeTab === t.id ? " active" : ""),
        onClick: () => setActiveTab(t.id)
      }, e("span", {className: "tab-icon"}, t.icon), t.label))
    ),

    // Browse
    activeTab === "browse" && e(React.Fragment, null,
      e("div", {className: "filter-row"},
        CATEGORIES.map(cat => e("button", {
          key: cat,
          className: "chip" + (category === cat ? " active" : ""),
          onClick: () => setCategory(cat)
        }, cat))
      ),
      e("div", {className: "recipe-count"}, filtered.length + " recipe" + (filtered.length !== 1 ? "s" : "")),
      e("div", {className: "recipe-list"},
        filtered.map(r => e("div", {
          key: r.id, className: "recipe-card",
          onClick: () => { setSelectedRecipe(r); setCheckedIngredients({}); }
        },
          e("div", {className: "recipe-card-header"},
            e("h3", null, r.name),
            r.calories > 0 && e("span", {className: "calories"}, r.calories + " cal")
          ),
          e("div", {className: "recipe-meta"},
            e("span", {className: "meta-tag"}, "\u{1F552} " + r.time),
            e("span", {className: "meta-tag"}, r.difficulty),
            e("span", {className: "meta-tag"}, "Serves " + r.servings)
          ),
          e("div", {className: "recipe-tags"},
            e("span", {className: "recipe-tag"}, r.category),
            e("span", {className: "recipe-tag source-tag"}, r.source)
          )
        )),
        filtered.length === 0 && e("div", {className: "empty-state"},
          e("div", {className: "empty-icon"}, "\u{1F50D}"),
          e("p", null, "No recipes found. Try a different search or category.")
        )
      )
    ),

    // Pantry
    activeTab === "pantry" && e("div", {className: "pantry-section"},
      e("div", {className: "section-title"}, "What\u2019s On Hand?"),
      e("p", {className: "section-desc"}, "Add ingredients you have and find recipes you can make right now."),
      e("div", {className: "pantry-input-row"},
        e("input", {
          className: "pantry-input",
          placeholder: "e.g. chicken, garlic, miso\u2026",
          value: pantryInput,
          onChange: ev => setPantryInput(ev.target.value),
          onKeyDown: ev => ev.key === "Enter" && addPantryItem()
        }),
        e("button", {className: "pantry-add-btn", onClick: addPantryItem}, "Add")
      ),
      pantryItems.length > 0 && e("div", {className: "pantry-tags"},
        pantryItems.map((item, i) => e("span", {key: i, className: "pantry-tag"},
          item,
          e("button", {onClick: () => setPantryItems(prev => prev.filter((_, j) => j !== i))}, "\u00D7")
        ))
      ),
      pantryMatches.length > 0 && e(React.Fragment, null,
        e("div", {className: "section-title", style: {fontSize: "18px", marginTop: "8px"}}, "Matching Recipes"),
        e("div", {className: "recipe-list", style: {padding: 0, marginTop: "12px"}},
          pantryMatches.map(r => e("div", {
            key: r.id, className: "recipe-card",
            onClick: () => { setSelectedRecipe(r); setCheckedIngredients({}); }
          },
            e("div", {className: "recipe-card-header"},
              e("h3", null, r.name),
              e("span", {className: "match-badge"}, r.matchCount + "/" + pantryItems.length)
            ),
            e("div", {className: "recipe-meta"},
              e("span", {className: "meta-tag"}, "\u{1F552} " + r.time),
              r.calories > 0 && e("span", {className: "meta-tag"}, r.calories + " cal")
            ),
            e("div", {className: "recipe-tags"},
              r.matchedItems.map((m, i) => e("span", {key: i, className: "recipe-tag"}, "\u2713 " + m))
            )
          ))
        )
      ),
      pantryItems.length > 0 && pantryMatches.length === 0 && e("div", {className: "empty-state"},
        e("div", {className: "empty-icon"}, "\u{1F937}"),
        e("p", null, "No matching recipes found. Try adding more or different ingredients.")
      )
    ),

    // Shopping
    activeTab === "shopping" && e("div", {className: "shopping-section"},
      e("div", {className: "section-title"}, "Shopping List"),
      shoppingList.length === 0 ?
        e("div", {className: "empty-state"},
          e("div", {className: "empty-icon"}, "\u{1F6D2}"),
          e("p", null, "Your shopping list is empty. Browse recipes and tap \u201CAdd to Shopping List\u201D to get started.")
        ) :
        e(React.Fragment, null,
          e("p", {className: "section-desc"}, shoppingList.length + " recipe" + (shoppingList.length !== 1 ? "s" : "") + " \u2014 tap items to check them off"),
          shoppingList.map(recipe => e("div", {key: recipe.id, className: "shopping-recipe-group"},
            e("div", {className: "shopping-recipe-name"},
              e("span", null, recipe.name),
              e("button", {className: "remove-recipe-btn", onClick: () => removeFromShoppingList(recipe.id)}, "\u2715")
            ),
            recipe.ingredients.map((ing, i) => {
              const key = recipe.id + "-" + i;
              const checked = checkedItems[key];
              return e("div", {
                key: key,
                className: "shopping-item" + (checked ? " crossed" : ""),
                onClick: () => setCheckedItems(prev => ({...prev, [key]: !prev[key]}))
              },
                e("div", {className: "ingredient-check" + (checked ? " checked" : "")}, checked && "\u2713"),
                e("span", null, ing)
              );
            })
          )),
          e("button", {className: "clear-list-btn", onClick: () => { setShoppingList([]); setCheckedItems({}); }}, "Clear Entire List")
        )
    ),

    // Add recipe
    activeTab === "add" && e(AddRecipeForm, {onSave: addRecipe}),

    // Detail overlay
    selectedRecipe && e(RecipeDetail, {
      recipe: selectedRecipe,
      onClose: () => setSelectedRecipe(null),
      onAddToList: addToShoppingList,
      isInList: shoppingList.some(r => r.id === selectedRecipe.id),
      checkedIngredients, setCheckedIngredients
    }),

    toast && e("div", {className: "toast"}, toast)
  );
}

function RecipeDetail({recipe, onClose, onAddToList, isInList, checkedIngredients, setCheckedIngredients}) {
  const e = React.createElement;
  const toggleIng = (i) => setCheckedIngredients(prev => ({...prev, [i]: !prev[i]}));

  return e("div", {className: "detail-overlay"},
    e("div", {className: "detail-header"},
      e("button", {className: "back-btn", onClick: onClose}, "\u2190"),
      e("h2", null, recipe.name)
    ),
    e("div", {className: "detail-body"},
      // Hero
      e("div", {className: "detail-hero"},
        e("div", {className: "detail-meta-row"},
          e("div", {className: "detail-meta-item"}, e("span", {className: "value"}, recipe.time), e("span", {className: "label"}, "Time")),
          e("div", {className: "detail-meta-item"}, e("span", {className: "value"}, recipe.difficulty), e("span", {className: "label"}, "Difficulty")),
          recipe.calories > 0 && e("div", {className: "detail-meta-item"}, e("span", {className: "value"}, recipe.calories), e("span", {className: "label"}, "Calories")),
          e("div", {className: "detail-meta-item"}, e("span", {className: "value"}, recipe.servings), e("span", {className: "label"}, "Serves"))
        )
      ),

      // Nutrition
      recipe.nutrition && recipe.calories > 0 && e("div", {className: "detail-section"},
        e("h3", null, "Nutrition Per Serving"),
        e("div", {className: "nutrition-grid"},
          e("div", {className: "nutrition-item"}, e("div", {className: "n-val"}, recipe.nutrition.protein), e("div", {className: "n-label"}, "Protein")),
          e("div", {className: "nutrition-item"}, e("div", {className: "n-val"}, recipe.nutrition.carbs), e("div", {className: "n-label"}, "Carbs")),
          e("div", {className: "nutrition-item"}, e("div", {className: "n-val"}, recipe.nutrition.fat), e("div", {className: "n-label"}, "Fat")),
          e("div", {className: "nutrition-item"}, e("div", {className: "n-val"}, recipe.nutrition.fiber), e("div", {className: "n-label"}, "Fiber")),
          e("div", {className: "nutrition-item"}, e("div", {className: "n-val"}, recipe.nutrition.sodium), e("div", {className: "n-label"}, "Sodium"))
        )
      ),

      // Ingredients
      e("div", {className: "detail-section"},
        e("h3", null, "Ingredients"),
        recipe.ingredients.map((ing, i) => e("div", {
          key: i, className: "ingredient-item", onClick: () => toggleIng(i)
        },
          e("div", {className: "ingredient-check" + (checkedIngredients[i] ? " checked" : "")}, checkedIngredients[i] && "\u2713"),
          e("span", {style: checkedIngredients[i] ? {textDecoration: "line-through", color: "var(--text-tertiary)"} : {}}, ing)
        ))
      ),

      // Instructions
      e("div", {className: "detail-section"},
        e("h3", null, "Instructions"),
        recipe.instructions.map((step, i) => e("div", {key: i, className: "instruction-item"},
          e("span", {className: "step-num"}, i + 1),
          e("span", null, step)
        ))
      ),

      recipe.notes && e("div", {className: "cook-note"}, recipe.notes),

      e("button", {
        className: "add-to-list-btn" + (isInList ? " added-btn" : ""),
        onClick: () => onAddToList(recipe),
        style: {marginTop: "20px"}
      }, isInList ? "\u2713 On Shopping List" : "Add to Shopping List"),

      e("div", {className: "source-line"}, recipe.source)
    )
  );
}

function AddRecipeForm({onSave}) {
  const e = React.createElement;
  const [name, setName] = useState("");
  const [time, setTime] = useState("");
  const [difficulty, setDifficulty] = useState("Easy");
  const [servings, setServings] = useState("");
  const [calories, setCalories] = useState("");
  const [cat, setCat] = useState("Poultry");
  const [ingredients, setIngredients] = useState("");
  const [instructions, setInstructions] = useState("");
  const [notes, setNotes] = useState("");

  const handleSave = () => {
    if (!name.trim() || !ingredients.trim()) return;
    onSave({
      name: name.trim(), time: time || "N/A", difficulty,
      servings: servings || "N/A", calories: parseInt(calories) || 0, category: cat,
      nutrition: {carbs: "-", protein: "-", fat: "-", fiber: "-", sodium: "-"},
      ingredients: ingredients.split("\n").map(s => s.trim()).filter(Boolean),
      instructions: instructions.split("\n").map(s => s.trim()).filter(Boolean),
      notes: notes.trim()
    });
    setName(""); setTime(""); setServings(""); setCalories("");
    setIngredients(""); setInstructions(""); setNotes("");
  };

  return e("div", {className: "form-section"},
    e("div", {className: "section-title", style: {marginBottom: "16px"}}, "Add a New Recipe"),
    e("div", {className: "form-group"},
      e("label", null, "Recipe Name *"),
      e("input", {value: name, onChange: ev => setName(ev.target.value), placeholder: "e.g. Grandma's Chicken Soup"})
    ),
    e("div", {className: "form-row"},
      e("div", {className: "form-group"}, e("label", null, "Time"), e("input", {value: time, onChange: ev => setTime(ev.target.value), placeholder: "30 min"})),
      e("div", {className: "form-group"}, e("label", null, "Servings"), e("input", {value: servings, onChange: ev => setServings(ev.target.value), placeholder: "4"}))
    ),
    e("div", {className: "form-row"},
      e("div", {className: "form-group"}, e("label", null, "Difficulty"),
        e("select", {value: difficulty, onChange: ev => setDifficulty(ev.target.value)},
          ["Easy", "Moderate", "Advanced"].map(d => e("option", {key: d, value: d}, d))
        )),
      e("div", {className: "form-group"}, e("label", null, "Calories"),
        e("input", {type: "number", value: calories, onChange: ev => setCalories(ev.target.value), placeholder: "200"}))
    ),
    e("div", {className: "form-group"}, e("label", null, "Category"),
      e("select", {value: cat, onChange: ev => setCat(ev.target.value)},
        CATEGORIES.filter(c => c !== "All").map(c => e("option", {key: c, value: c}, c))
      )),
    e("div", {className: "form-group"},
      e("label", null, "Ingredients * (one per line)"),
      e("textarea", {value: ingredients, onChange: ev => setIngredients(ev.target.value), placeholder: "1 cup flour\n2 eggs\n1/2 cup sugar"})
    ),
    e("div", {className: "form-group"},
      e("label", null, "Instructions (one step per line)"),
      e("textarea", {value: instructions, onChange: ev => setInstructions(ev.target.value), placeholder: "Preheat oven to 350\u00B0F.\nMix dry ingredients.\nAdd wet ingredients and stir."})
    ),
    e("div", {className: "form-group"},
      e("label", null, "Cook's Notes"),
      e("textarea", {value: notes, onChange: ev => setNotes(ev.target.value), placeholder: "Tips, substitutions, variations\u2026", style: {minHeight: "70px"}})
    ),
    e("button", {className: "save-recipe-btn", onClick: handleSave}, "Save Recipe")
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
